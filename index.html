<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="container">
      <button>Rock</button>
      <button>Paper</button>
      <button>Scissors</button>
    </div>
    <div class="score">
      <div class="players">
        <div>YOU</div>
        <div>CPU</div>
      </div>
      <div class="numbers">
        <div>1</div>
        <div>0</div>
      </div>
      <div class="statement">You win! Scissors beat Paper</div>
    </div>
  </body>
</html>
